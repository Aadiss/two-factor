services:
  mongodb:
    image: mongo:7
    container_name: two_factor_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: two_factor_auth
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: two_factor_backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: two_factor_auth
      JWT_SECRET_KEY: super-secret-key-change-in-production
      RP_ID: localhost
      RP_NAME: TwoFactorApp
      RP_ORIGIN: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: two_factor_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
